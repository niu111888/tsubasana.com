media:
  input: assets
  output: /assets
  extensions: [jpg, jpeg, png, gif, webp, avif, mp4, mov]

content:
  - name: site
    label: サイト設定（動画・写真・連絡先）
    type: file
    path: content/site.json
    fields:
      - name: email
        label: メールアドレス
        description: Emailボタンのリンク先。空欄にするとボタンが隠れます
        type: string
      - name: instagram
        label: Instagram のURL
        description: 例 https://www.instagram.com/xxxx（空欄でボタン非表示）
        type: string
      - name: x
        label: X (Twitter) のURL
        description: 例 https://x.com/xxxx（空欄でボタン非表示）
        type: string
      - name: video
        label: ピアノ動画
        type: object
        fields:
          - name: youtube
            label: YouTubeのURL
            description: 動画ページのURLをそのまま貼り付けてください（動画IDだけでもOK）
            type: string
          - name: mp4
            label: mp4ファイルのパス
            description: メディアからアップロードした場合は /assets/ファイル名.mp4 と入力（YouTube欄が空のときに使われます）
            type: string
      - name: travel
        label: 旅の写真
        description: 追加した写真がTravelセクションに表示されます（1枚も無い間は仮の画像を表示）
        type: object
        list: true
        fields:
          - name: image
            label: 写真
            type: image
          - name: caption_ja
            label: キャプション（日本語）
            type: string
          - name: caption_en
            label: キャプション（英語）
            type: string
          - name: caption_zh
            label: キャプション（中文）
            type: string

  - name: ja
    label: 文章（日本語）
    type: file
    path: content/ja.json
    fields:
      - { name: heroVertical, label: トップ・縦書きの一言, type: string }
